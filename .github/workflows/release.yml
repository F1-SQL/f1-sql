name: F1 SQL release pipeline

on:
  schedule:
    - cron: "17 06 * * 2"
  workflow_dispatch:
    inputs:
      season:
        description: "Season to inspect (blank uses the current UTC year)"
        required: false
        type: string
      dry_run:
        description: "Run validation without publishing"
        required: true
        default: true
        type: boolean
      publish:
        description: "Request publication after every gate (protected environment required)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: f1-sql-release
  cancel-in-progress: false

jobs:
  detect:
    name: Detect settled rounds
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.detect.outputs.ready }}
      target: ${{ steps.detect.outputs.target }}
      status: ${{ steps.detect.outputs.status }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            .f1sql/raw
            .f1sql/fastf1-cache
          key: f1sql-${{ runner.os }}-${{ inputs.season || 'current' }}-${{ hashFiles('pyproject.toml') }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .
      - id: detect
        env:
          SEASON: ${{ inputs.season }}
        run: |
          if [ -n "$SEASON" ]; then
            f1sql detect --season "$SEASON" --github-output "$GITHUB_OUTPUT"
          else
            f1sql detect --github-output "$GITHUB_OUTPUT"
          fi
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: readiness-diagnostics
          path: .f1sql/raw
          if-no-files-found: ignore

  validation:
    name: Validate candidate (no publish)
    needs: detect
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            .f1sql/raw
            .f1sql/fastf1-cache
          key: f1sql-validation-${{ runner.os }}-${{ needs.detect.outputs.target }}-${{ hashFiles('pyproject.toml') }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest -q
      - run: f1sql init "${{ needs.detect.outputs.target }}"
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validation-diagnostics
          path: .f1sql
          if-no-files-found: ignore

  build:
    name: Build and package release candidate
    needs: [detect, validation]
    if: needs.detect.outputs.ready == 'true' && needs.validation.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      F1SQL_BACKUP_OUTPUT: ${{ github.workspace }}/artifacts/F1SqlPhase5.bak
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            .f1sql/raw
            .f1sql/fastf1-cache
          key: f1sql-build-${{ runner.os }}-${{ needs.detect.outputs.target }}-${{ hashFiles('pyproject.toml') }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,fastf1]'
      - name: Build Jolpica/FastF1 candidate
        run: |
          python scripts/build_live_candidate.py \
            "${{ needs.detect.outputs.target }}" \
            --workspace "$GITHUB_WORKSPACE" \
            --output "$GITHUB_WORKSPACE/candidate"
      - name: Generate disposable SQL Server password
        run: echo "F1SQL_SQLSERVER_PASSWORD=F1SqlCI!$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - name: Build and verify SQL Server 2019 backup
        env:
          F1SQL_LOAD_SQL: ${{ github.workspace }}/candidate/load-plan.sql
        run: bash scripts/sqlserver_integration.sh
      - name: Package release bundle
        run: |
          python scripts/package_candidate_release.py \
            "$GITHUB_WORKSPACE/candidate" \
            "$GITHUB_WORKSPACE/artifacts/F1SqlPhase5.bak" \
            "$GITHUB_WORKSPACE/release-output"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-bundle
          path: release-output
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sqlserver-2019-backup
          path: artifacts/F1SqlPhase5.bak
          if-no-files-found: error

  restore_forward:
    name: Restore-forward verify on SQL Server 2022
    needs: [detect, validation, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sqlserver-2019-backup
          path: artifacts
      - name: Generate disposable SQL Server password
        run: echo "F1SQL_SQLSERVER_PASSWORD=F1SqlCI!$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - run: F1SQL_BACKUP_INPUT="$GITHUB_WORKSPACE/artifacts/F1SqlPhase5.bak" bash scripts/sqlserver_restore_forward.sh

  # Publication is deliberately opt-in twice: the dispatch input must be true
  # and the protected environment variable must be enabled by a maintainer.
  # Until a production build job uploads `release-bundle`, this job is skipped.
  publish:
    name: Publish immutable release
    needs: [detect, validation, build, restore_forward]
    if: >-
      needs.detect.outputs.ready == 'true' &&
      needs.validation.result == 'success' &&
      needs.build.result == 'success' &&
      needs.restore_forward.result == 'success' &&
      inputs.dry_run != true &&
      inputs.publish == true &&
      vars.F1SQL_RELEASE_BUNDLE_READY == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-bundle
          path: release-bundle
      - name: Verify release bundle before tag creation
        env:
          TARGET: ${{ needs.detect.outputs.target }}
        run: |
          test -n "$TARGET"
          test -f "release-bundle/$TARGET/manifest.json"
          test -f "release-bundle/$TARGET/checksums.sha256"
          grep -q 'database.bak' "release-bundle/$TARGET/checksums.sha256"
      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ needs.detect.outputs.target }}
        run: |
          assets=()
          for path in "release-bundle/$TARGET"/*; do
            if [ -f "$path" ]; then assets+=("$path"); fi
          done
          gh release create "$TARGET" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "F1 SQL $TARGET" \
            --generate-notes
