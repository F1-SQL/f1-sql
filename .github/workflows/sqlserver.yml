name: SQL Server integration

on:
  push:
    branches: [main]
    paths:
      - "schema/**"
      - "scripts/sqlserver_*.sh"
      - "src/f1sql/**"
      - "tests/**"
  pull_request:
    paths:
      - "schema/**"
      - "scripts/sqlserver_*.sh"
      - "src/f1sql/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: f1-sql-sqlserver
  cancel-in-progress: true

jobs:
  sqlserver-2019:
    name: SQL Server 2019 build and verification
    runs-on: ubuntu-latest
    env:
      F1SQL_BACKUP_OUTPUT: ${{ github.workspace }}/artifacts/F1SqlPhase5.bak
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest -q
      - name: Generate disposable SQL Server password
        run: echo "F1SQL_SQLSERVER_PASSWORD=F1SqlCI!$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - run: bash scripts/sqlserver_integration.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sqlserver-2019-backup
          path: artifacts/F1SqlPhase5.bak
          if-no-files-found: error

  sqlserver-2022:
    name: SQL Server 2022 restore-forward
    needs: sqlserver-2019
    runs-on: ubuntu-latest
    env:
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sqlserver-2019-backup
          path: artifacts
      - name: Generate disposable SQL Server password
        run: echo "F1SQL_SQLSERVER_PASSWORD=F1SqlCI!$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - run: F1SQL_BACKUP_INPUT="$GITHUB_WORKSPACE/artifacts/F1SqlPhase5.bak" bash scripts/sqlserver_restore_forward.sh
